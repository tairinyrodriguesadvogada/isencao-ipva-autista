name: Deploy IPVA
on:
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Copy ipva-index.html to index.html
        run: cp ipva-index.html index.html
      - name: Commit
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add index.html
          git diff --staged --quiet && echo "No changes" || (git commit -m "deploy: nova calculadora IPVA autista" && git push)
